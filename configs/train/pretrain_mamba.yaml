# Mamba Encoder Pretraining Configuration
pretrain:
  method: "masked_reconstruction"
  epochs: 100
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_steps: 500
  grad_clip: 1.0
  grad_accumulation_steps: 1

  # AMP
  use_amp: true
  amp_dtype: "bf16"  # bf16 or fp16

  # Checkpoint
  save_every: 10
  eval_every: 5
  use_gradient_checkpointing: false

  # Losses
  recon_weight: 1.0
  health_pred_weight: 0.5
  latent_reg_weight: 0.01
